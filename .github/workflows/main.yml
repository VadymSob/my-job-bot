name: Daily Job Report

on:
  schedule:
    - cron: '0 7 * * *' # Це 07:00 за Гринвічем (якраз 09:00 за Києвом)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run bot
        run: python bot.py
